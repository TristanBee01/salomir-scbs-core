name: SCBS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Validate JSON Schema Syntax
        run: |
          python -m json.tool < config/telemetry-schema.json > /dev/null
          echo "SCBS Telemetry Schema is valid."
